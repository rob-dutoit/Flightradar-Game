<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Flight Tracker</title>

    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://rawcdn.githack.com/bbecquet/Leaflet.RotatedMarker/master/leaflet.rotatedMarker.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #header-airport {
            font-size: 20px;
            font-weight: bold;
            margin-top: 15px;
        }

        #cumulative-count {
            margin: 10px;
            font-weight: bold;
            text-align: center;
        }

        #map {
            height: 600px;
            width: 600px;
            border-radius: 50%;
            overflow: hidden;
        }

        button {
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="header-airport">Fly me:</div>
    <div id="cumulative-count">Total Clicks: 0</div>
    <div id="map"></div>

    <script>
        const map = L.map('map');

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        const planeIcon = L.icon({
            iconUrl: "/static/plane.png",
            iconSize: [30, 30],
            iconAnchor: [15, 15],
            popupAnchor: [0, -15]
        });

        const airportIcon = L.icon({
            iconUrl: "/static/airport.png",
            iconSize: [25, 25],
            iconAnchor: [12, 12],
            popupAnchor: [0, -10]
        });

        let airports = {};
        let flights = [];
        let flightMarkers = [];
        let flightButtonClicks = {};
        let totalClicks = 0;
        let gameStart = null;
        let gameEnd = null;
        let gameActive = true;

        const defaultAirportCode = "TSV";

        // Load airports
        fetch("/static/airports.json")
            .then(res => res.json())
            .then(data => {
                airports = data;
                Object.keys(airports).forEach(code => {
                    L.marker(airports[code], { icon: airportIcon })
                        .addTo(map)
                        .bindPopup(`<b>${code} Airport</b>`);
                });
                if (airports[defaultAirportCode]) {
                    map.setView(airports[defaultAirportCode], 9);
                    document.getElementById("header-airport").innerText =
                        `Fly me: ${defaultAirportCode}`;
                }
            });

        // Function to load flights and remove old markers
        function loadFlights() {
            // Remove old markers
            flightMarkers.forEach(marker => map.removeLayer(marker));
            flightMarkers = [];

            flights.forEach(flight => {
                flightButtonClicks[flight.flight_no] = flightButtonClicks[flight.flight_no] || {
                    departure: 0,
                    arrival: 0
                };

                const marker = L.marker([flight.lat, flight.long], {
                    icon: planeIcon,
                    rotationAngle: flight.track
                }).addTo(map);

                flight.marker = marker;
                flightMarkers.push(marker);

                marker.bindPopup(getPopupHTML(flight));
            });
        }

        // Function to generate popup HTML
        function getPopupHTML(f) {
            return `
            <div style="text-align: center;">
                <b>${f.flight_no}</b><br>
                <div style="display: flex; justify-content: center; gap: 5px; align-items: center;">
                    <button onclick="trackClick('${f.flight_no}', 'departure', '${f.departure}')">
                        ${f.departure}
                    </button>
                    →
                    <button onclick="trackClick('${f.flight_no}', 'arrival', '${f.arrival}')">
                        ${f.arrival}
                    </button>
                </div>
                <div style="margin-top: 5px;">
                    Track: ${f.track}°<br>
                    Departure clicked: ${flightButtonClicks[f.flight_no].departure}<br>
                    Arrival clicked: ${flightButtonClicks[f.flight_no].arrival}
                </div>
            </div>
            `;
        }

        // Track flight button clicks
        function trackClick(flightNo, type, airport) {
            if (!gameActive) return;

            flightButtonClicks[flightNo][type]++;
            totalClicks++;

            document.getElementById('cumulative-count').innerText =
                `Total Clicks: ${totalClicks}`;

            zoomToAirport(airport);

            const flight = flights.find(f => f.flight_no === flightNo);
            if (flight && flight.marker) {
                flight.marker.setPopupContent(getPopupHTML(flight));
                flight.marker.openPopup();
            }
        }

        // Zoom to an airport and refresh flights
        function zoomToAirport(code) {
    const coords = airports[code];
    if (!coords) return;

    map.flyTo(coords, 9);

    // Fetch updated flights for this airport
    fetch(`/update_flights/${code}`)
        .then(res => res.json())
        .then(data => {
            flights = data.flights;  // replace old flights
            loadFlights();           // redraw markers
        });

    if (code === gameEnd) {
        gameActive = false;
    }
}

        // Start a new game
        fetch("/start_game")
            .then(res => res.json())
            .then(data => {
                flights = data.flights; // populate flights array
                loadFlights();          // draw markers
            });
    </script>

</body>
</html>
